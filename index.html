<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="/pfp.webp" rel="icon">
<title>snow's bio</title>

<meta name="title" content="snow's bio" />
<meta name="description" content="snow's bio" />
<meta name="theme-color" content="#0f0f0f">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #080808;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
}

#enter-screen {
    position: fixed;
    inset: 0;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.7s ease;
}

#enter-screen span {
    color: rgba(255,255,255,0.6);
    font-size: 18px;
}

#site {
    opacity: 0;
    transition: opacity 0.7s ease;
}

#site.visible {
    opacity: 1;
}

#particles-js {
    position: fixed;
    inset: 0;
    z-index: 0;
}

#card-outer {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

#card {
    width: 90%;
    max-width: 700px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(18px);
    text-align: center;
    color: white;
    transform-style: preserve-3d;
}

.avatar-placeholder {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    margin-bottom: 10px;
}

.username {
    font-size: 20px;
    font-weight: 600;
}

.handle {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 15px;
}

.divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 15px 0;
}

.bio {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}

.socials {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.socials a {
    color: rgba(255,255,255,0.7);
    font-size: 26px;
    transition: 0.2s;
}

.socials a:hover {
    transform: scale(1.1);
    color: white;
}

.footer {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
}
</style>
</head>

<body>

<div id="enter-screen">
    <span>click to enter</span>
</div>

<div id="site">
    <div id="particles-js"></div>

    <div id="card-outer">
        <div id="card">

            <img class="avatar-placeholder" src="pfp.webp" />

            <div class="username">hi, im snow.</div>
            <div class="handle">@light.snow on Discord</div>

            <div class="divider"></div>

            <div class="bio">
                keyboard enjoyer • fps gamer • coder<br>
                i build random sites and play way too many games<br>
                dm me if you wanna play something
            </div>

            <div class="socials">
                <a href="https://roblox.com/users/4111484395/profile" target="_blank">
                    <i class="fa-solid fa-gamepad"></i>
                </a>
                <a href="https://discord.com/users/1453556642296627355" target="_blank">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="https://instagram.com/watermelon.cat398" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://open.spotify.com/user/31m24mzkhxfjhvrgdv2t4blawyr4" target="_blank">
                    <i class="fa-brands fa-spotify"></i>
                </a>
            </div>

            <div class="footer">
                site by <a href="https://qatual.net" target="_blank">qatual</a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
const enterScreen = document.getElementById('enter-screen');
const site = document.getElementById('site');

const audio = new Audio('audio.mp3');
audio.loop = true;

enterScreen.addEventListener('click', () => {
    audio.play();
    enterScreen.style.opacity = 0;
    site.classList.add('visible');
    setTimeout(() => enterScreen.remove(), 700);
});

const card = document.getElementById('card');

card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const dx = (e.clientX - (rect.left + rect.width / 2)) / rect.width;
    const dy = (e.clientY - (rect.top + rect.height / 2)) / rect.height;

    card.style.transform =
        `perspective(900px) rotateY(${dx * 10}deg) rotateX(${-dy * 10}deg) scale(1.02)`;
});

card.addEventListener('mouseleave', () => {
    card.style.transform = '';
});

particlesJS("particles-js", {
    particles: {
        number: { value: 50 },
        color: { value: "#ffffff" },
        size: { value: 3 },
        move: { enable: true, speed: 1 }
    }
});
</script>

</body>
</html>
